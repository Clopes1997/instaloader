<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instaloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html {
            width: 600px;
            height: 600px;
            overflow: hidden;
        }

        /*
         * 600 × 600 px popup.
         * body has an explicit height so flex children can share it correctly.
         * No height:100% on html/body — that creates a circular dependency in
         * popup context and collapses flex children to zero height.
         */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            width: 600px;
            height: 600px;
            padding: 12px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            gap: 7px;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .header .icon { font-size: 20px; }

        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        /* ── Filter rows ── */
        .filter-row {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .filter-btn {
            flex: 1;
            padding: 7px 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.75);
        }

        .filter-btn:hover:not(:disabled) { background: rgba(255,255,255,0.18); }

        #type-filter-row .filter-btn.active { background: #0ea5e9; color: white; }
        #size-filter-row .filter-btn.active { background: rgba(255,255,255,0.22); color: white; }

        .filter-btn:disabled { opacity: 0.3; cursor: default; }

        /* ── Action row ── */
        .action-controls {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .action-btn {
            flex: 1;
            padding: 7px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        .action-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .action-btn.download-all {
            background: rgba(34,197,94,0.18);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.28);
        }
        .action-btn.download-all:hover:not(:disabled) { background: rgba(34,197,94,0.35); }

        .action-btn.rescan {
            background: rgba(251,191,36,0.13);
            color: #fcd34d;
            border: 1px solid rgba(251,191,36,0.22);
        }
        .action-btn.rescan:hover:not(:disabled) { background: rgba(251,191,36,0.28); }

        /* ── Min-size row ── */
        .secondary-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .min-size-label {
            font-size: 12px;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
        }

        .min-size-input {
            width: 58px;
            padding: 5px 8px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 12px;
            text-align: center;
        }
        .min-size-input:focus { outline: none; border-color: #0ea5e9; }

        /* ── Status bar ── */
        .status {
            padding: 8px 14px;
            border-radius: 7px;
            font-size: 13px;
            text-align: center;
            flex-shrink: 0;
        }
        .status.loading { background: rgba(255,255,255,0.88); color: #1a1a2e; }
        .status.loading::before { content: '⏳ '; }
        .status.success { background: rgba(255,255,255,0.93); color: #16a34a; }
        .status.success::before { content: '✅ '; }
        .status.error   { background: rgba(255,255,255,0.93); color: #ef4444; }
        .status.error::before   { content: '❌ '; }

        /* ── Hint ── */
        .grid-hint {
            font-size: 11px;
            color: rgba(255,255,255,0.38);
            text-align: center;
            flex-shrink: 0;
        }

        /* ── Media grid — grows to fill remaining space ── */
        #media-container {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            grid-auto-rows: 90px;
            align-content: start;
            gap: 7px;
            overflow-y: auto;
            padding: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
        }

        #media-container:empty { display: none; }

        /* ── Media items ── */
        .media-item {
            position: relative;
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            background: rgba(255,255,255,0.09);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .media-item:hover { transform: scale(1.04); box-shadow: 0 4px 14px rgba(0,0,0,0.45); }

        /* ── Image cards ── */
        .media-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .media-item .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 100%);
        }

        .media-item.loading .placeholder::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer { 100% { left: 100%; } }

        .media-item.no-preview .placeholder {
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        }

        /* ── Video cards ── */
        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #1a1a2e 100%);
            color: white;
        }

        .video-play-icon {
            font-size: 26px;
            opacity: 0.88;
            line-height: 1;
        }

        .video-format-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
            margin-top: 6px;
        }

        /* ── Badges / overlays ── */
        .media-item .download-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .media-item:hover .download-overlay { opacity: 1; }

        .media-item.downloaded { opacity: 0.55; }

        .media-item.downloaded::after {
            content: '✓';
            position: absolute;
            top: 4px; right: 4px;
            background: #22c55e;
            color: white;
            width: 18px; height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            z-index: 10;
        }

        .media-item .size-badge {
            position: absolute;
            bottom: 4px; left: 4px;
            background: rgba(0,0,0,0.65);
            color: white;
            font-size: 9px;
            padding: 2px 4px;
            border-radius: 3px;
            z-index: 5;
        }

        /* ── Toast ── */
        .hidden { display: none !important; }

        #toast {
            position: fixed;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(20,20,40,0.96);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.18s, transform 0.18s;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.13);
            z-index: 100;
        }

        #toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="header">
        <span class="icon">🖼️</span>
        <h1>Instaloader</h1>
    </div>

    <div class="filter-row" id="type-filter-row">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="images">Images</button>
        <button class="filter-btn" data-type="videos">Videos</button>
    </div>

    <div class="filter-row" id="size-filter-row">
        <button class="filter-btn active" data-size="all">Any Size</button>
        <button class="filter-btn" data-size="large">Large 500+</button>
        <button class="filter-btn" data-size="medium">Medium</button>
    </div>

    <div class="action-controls">
        <button class="action-btn download-all" id="download-all-btn">Download Visible as ZIP</button>
        <button class="action-btn rescan" id="refresh-btn">Re-scan Page</button>
    </div>

    <div class="secondary-controls">
        <span class="min-size-label">Image min size (px):</span>
        <input type="number" id="min-size" class="min-size-input" value="50" min="0" max="9999">
    </div>

    <div id="status" class="status loading">Initializing...</div>

    <p class="grid-hint">Click to download · Right-click to copy URL</p>

    <div id="media-container"></div>

    <div id="toast"></div>

    <script src="popup.js"></script>
</body>
</html>
